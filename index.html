<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- displays site properly based on user's device -->

     <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

     <title>Frontend Mentor | Huddle landing page with single introductory section</title>

     <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@400;600&display=swap"
          rel="stylesheet">
     <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css"
          integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">
     <link rel="stylesheet" href="css/style.css">
     <style>
          .attribution {
               font-size: 11px;
               text-align: center;
          }

          .attribution a {
               color: hsl(66, 73%, 44%);
          }
     </style>
</head>

<body>

     <header>
          <div class="container">
               <img src="images/logo.svg" alt="Logo" width="200px">
          </div>
     </header>
     <main>
          <div class="container">
               <div class="mockup-image">
                    <img src="images/illustration-mockups.svg" alt="">
               </div>
               <div class="text-wrapper">
                    <h1>Build The Community Your Fans Will Love</h1>
                    <p>Huddle re-imagines the way we build communities. You have a voice, but so does your
                         audience.
                         Create connections with your users as you engage in genuine discussion.</p>
                    <a href="#">Register</a>
               </div>
          </div>
     </main>
     <div class="social-icons">
          <div class="container">
               <span class="fa-stack" style="vertical-align: top;">
                    <i class="far fa-circle fa-stack-2x"></i>
                    <i class="fab fa-facebook-f fa-stack-1x"></i>
               </span>
               <span class="fa-stack" style="vertical-align: top;">
                    <i class="far fa-circle fa-stack-2x"></i>
                    <i class="fab fa-twitter fa-stack-1x"></i>
               </span>
               <span class="fa-stack" style="vertical-align: top;">
                    <i class="far fa-circle fa-stack-2x"></i>
                    <i class="fab fa-instagram fa-stack-1x"></i>
               </span>
          </div>
     </div>






     <footer>
          <p class="attribution">
               Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
               Coded by <a href="https://github.com/iyefreedy">Muhammad Quraisy</a>.
          </p>
     </footer>
</body>

</html>
